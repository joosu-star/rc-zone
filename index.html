<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RC SYSTEM PRO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚗 RC SYSTEM PRO</h1>

<div id="errorBox"></div>

<div class="nav">
  <button onclick="cambiarVista('inicio')">Inicio</button>
  <button onclick="cambiarVista('clientes')">Clientes</button>
  <button onclick="cambiarVista('resumen')">Historial</button>
</div>

<div class="top">
  <button onclick="abrirCaja()">Abrir Caja</button>
  <button onclick="cerrarCaja()">Cerrar Caja</button>
  <button onclick="hacerRetiro()">Retiro</button>
</div>

<h2 id="dinero">💰 $0</h2>

<div id="inicio" class="vista">
  <div id="coches" class="grid"></div>
</div>

<div id="clientes" class="vista oculto">
  <h2>Clientes</h2>
  <div id="listaClientes"></div>
</div>

<div id="resumen" class="vista oculto">
  <h2>Historial</h2>
  <div id="listaResumen"></div>
</div>

<div id="modal" class="modal oculto">
  <div class="contenido">
    <h3>Iniciar coche</h3>
    <input id="nombre" placeholder="Nombre">
    <input id="tiempo" type="number" placeholder="Minutos">
    <button onclick="confirmarInicio()">Iniciar</button>
    <button onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
